<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Daria Posuda</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body id="page"
  class="min-h-screen transition-colors duration-500 bg-gradient-to-br from-emerald-950 via-emerald-900 to-black text-emerald-50">

<!-- HEADER -->
<header class="bg-black/60 backdrop-blur sticky top-0 z-10 border-b border-yellow-400/40">
  <div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-6">
    <h1 id="brand" class="text-3xl font-extrabold tracking-widest uppercase text-yellow-300">
      Daria Posuda
    </h1>

    <!-- THEME SWITCHER -->
    <div class="flex gap-2 text-sm">
      <button onclick="setTheme('emerald')"
        class="px-4 py-2 rounded-full border border-yellow-400 text-yellow-300 hover:bg-yellow-400 hover:text-black transition">
        Emerald 👑
      </button>
      <button onclick="setTheme('black')"
        class="px-4 py-2 rounded-full border border-gray-300 text-gray-200 hover:bg-gray-200 hover:text-black transition">
        Black 🖤
      </button>
      <button onclick="setTheme('white')"
        class="px-4 py-2 rounded-full border border-gray-500 text-gray-800 bg-white hover:bg-gray-100 transition">
        White 🤍
      </button>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-6">

<!-- HERO -->
<section class="text-center py-32">
  <h2 id="title" class="text-6xl font-extrabold mb-6 text-yellow-300">
    Королевская посуда
  </h2>
  <p id="subtitle" class="text-xl mb-10 text-emerald-300">
    Роскошь • Качество • Стиль
  </p>
  <a
    href="https://www.instagram.com/daria_posuda_uralsk/"
    target="_blank"
    class="inline-block bg-gradient-to-r from-yellow-300 to-amber-400 text-black px-14 py-4 rounded-full font-bold shadow-2xl hover:scale-105 transition">
    Смотреть каталог
  </a>
</section>

</main>

<footer id="footer"
  class="bg-black border-t border-yellow-400/40 text-amber-400 py-6 text-center">
  © 2026 Daria Posuda
</footer>

<!-- THEME SCRIPT -->
<script>
function setTheme(theme) {
  const body = document.getElementById("page");
  const title = document.getElementById("title");
  const subtitle = document.getElementById("subtitle");
  const footer = document.getElementById("footer");

  body.className = "min-h-screen transition-colors duration-500";

  if (theme === "emerald") {
    body.classList.add(
      "bg-gradient-to-br","from-emerald-950","via-emerald-900","to-black","text-emerald-50"
    );
    title.className = "text-6xl font-extrabold mb-6 text-yellow-300";
    subtitle.className = "text-xl mb-10 text-emerald-300";
    footer.className = "bg-black border-t border-yellow-400/40 text-amber-400 py-6 text-center";
  }

  if (theme === "black") {
    body.classList.add(
      "bg-gradient-to-br","from-black","via-neutral-900","to-black","text-gray-100"
    );
    title.className = "text-6xl font-extrabold mb-6 text-emerald-400";
    subtitle.className = "text-xl mb-10 text-gray-300";
    footer.className = "bg-black border-t border-gray-700 text-gray-400 py-6 text-center";
  }

  if (theme === "white") {
    body.classList.add(
      "bg-stone-100","text-gray-900"
    );
    title.className = "text-6xl font-extrabold mb-6 text-gray-900";
    subtitle.className = "text-xl mb-10 text-gray-600";
    footer.className = "bg-white border-t border-gray-300 text-gray-600 py-6 text-center";
  }
}
</script>

</body>
</html>

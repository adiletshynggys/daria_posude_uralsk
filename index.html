<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Daria Posuda Uralsk</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ✅ Tailwind CSS — CORRECT -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-emerald-950 via-emerald-900 to-black text-emerald-50">

<!-- HEADER -->
<header class="sticky top-0 z-10 bg-black/70 backdrop-blur border-b border-emerald-400/40">
  <div class="max-w-7xl mx-auto px-6 py-5 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
    <h1 class="text-3xl font-extrabold tracking-widest uppercase text-emerald-300">
      Daria Posuda Uralsk
    </h1>

    <a href="https://wa.me/77470817281"
       class="inline-block bg-green-500 text-black px-6 py-2 rounded-full font-bold hover:scale-105 transition"
       target="_blank">
      WhatsApp заказ
    </a>
  </div>
</header>

<main class="max-w-7xl mx-auto px-6">

<!-- HERO -->
<section class="text-center py-20">
  <h2 class="text-5xl md:text-6xl font-extrabold mb-4">
    Посуда для дома и подарков
  </h2>
  <p class="text-lg md:text-xl text-emerald-200">
    Качество • Стиль • Практичность
  </p>
</section>

<!-- TABS -->
<section class="mb-12 text-center">
  <div class="flex justify-center gap-4">
    <button onclick="showTab('boards')" class="tabBtn">Доски</button>
  </div>
</section>

<!-- PRODUCTS -->
<section id="boards" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-10 pb-24">

  <!-- PRODUCT CARD -->
  <div class="bg-black/50 rounded-3xl overflow-hidden shadow-2xl border border-emerald-400/30">

    <img
      src="images/cutting-board-leevan.jpg"
      alt="Разделочная доска Leevan"
      class="w-full h-72 object-cover"
    >

    <div class="p-6 text-center">
      <h3 class="text-xl font-semibold mb-1">
        Разделочная доска Leevan
      </h3>

      <p class="text-emerald-300 mb-4">
        от 9 500 ₸
      </p>

      <a href="https://wa.me/77470817281"
         target="_blank"
         class="inline-block bg-green-500 text-black px-6 py-2 rounded-full font-bold hover:scale-105 transition">
        Заказать в WhatsApp
      </a>
    </div>
  </div>

</section>

</main>

<footer class="text-center py-6 text-sm text-emerald-300 border-t border-emerald-400/30">
  © 2026 Daria Posuda Uralsk
</footer>

<!-- SIMPLE JS (tabs ready for expansion) -->
<script>
function showTab(id) {
  document.querySelectorAll('section[id]').forEach(sec => {
    sec.style.display = sec.id === id ? 'grid' : 'none';
  });
}
</script>

<!-- STYLES -->
<style>
.tabBtn {
  border: 1px solid rgba(52, 211, 153, 0.5);
  color: #6ee7b7;
  padding: .5rem 1.5rem;
  border-radius: 999px;
  font-weight: 600;
}
.tabBtn:hover {
  background: #10b981;
  color: #000;
}
</style>

</body>
</html>

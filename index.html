<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Daria Posuda Uralsk</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ✅ THIS IS THE ONLY CORRECT TAILWIND CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body id="page"
  class="min-h-screen transition-colors duration-500 bg-gradient-to-br from-emerald-950 via-emerald-900 to-black text-emerald-50">

<!-- HEADER -->
<header class="sticky top-0 z-10 backdrop-blur bg-black/60 border-b border-yellow-400/40">
  <div class="max-w-7xl mx-auto px-6 py-5 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
    <h1 class="text-3xl font-extrabold tracking-widest uppercase text-yellow-300">
      Daria Posuda Uralsk
    </h1>

    <!-- THEME SWITCHER -->
    <div class="flex flex-wrap gap-2 text-sm">
      <button class="themeBtn" onclick="setTheme('emerald')">Emerald 👑</button>
      <button class="themeBtn" onclick="setTheme('navy')">Navy ⚜️</button>
      <button class="themeBtn" onclick="setTheme('black')">Black 🖤</button>
      <button class="themeBtn" onclick="setTheme('white')">White 🤍</button>
      <button class="themeBtn" onclick="setTheme('rose')">Rose 🌸</button>
      <button class="themeBtn" onclick="setTheme('olive')">Olive 🌿</button>
      <button class="themeBtn" onclick="setTheme('midnight')">Midnight 🌙</button>
      <button class="themeBtn" onclick="setTheme('cream')">Cream ✨</button>
      <button class="themeBtn" onclick="setTheme('platinum')">Platinum ⚪</button>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-6">

<!-- HERO -->
<section class="text-center py-20">
  <h2 class="text-5xl md:text-6xl font-extrabold mb-4 text-yellow-300">
    Посуда для дома и подарков
  </h2>
  <p class="text-lg md:text-xl mb-8 opacity-90">
    Роскошь • Качество • Стиль
  </p>

  <div class="flex flex-wrap justify-center gap-4">
    <a href="https://www.instagram.com/daria_posuda_uralsk/" target="_blank"
       class="inline-block bg-gradient-to-r from-yellow-300 to-amber-400 text-black px-8 py-4 rounded-full font-bold shadow-2xl hover:scale-105 transition">
      Instagram
    </a>
    <a href="https://wa.me/77470817281" target="_blank"
       class="inline-block bg-green-500 text-black px-8 py-4 rounded-full font-bold shadow-2xl hover:scale-105 transition">
      WhatsApp заказ
    </a>
  </div>
</section>

<!-- CATEGORY TABS -->
<section class="mb-12 text-center">
  <div class="flex flex-wrap justify-center gap-3">
    <button class="tabBtn" onclick="filterItems('all')">Все</button>
    <button class="tabBtn" onclick="filterItems('cook')">Кастрюли</button>
    <button class="tabBtn" onclick="filterItems('tea')">Чайники</button>
    <button class="tabBtn" onclick="filterItems('set')">Сервизы</button>
    <button class="tabBtn" onclick="filterItems('accessory')">Аксессуары</button>
  </div>
</section>

<!-- CATALOG -->
<section class="grid gap-8 sm:grid-cols-2 lg:grid-cols-3 pb-24">

  <div class="item cook product bg-black/50">
    <img src="https://via.placeholder.com/400x300" class="w-full h-56 object-cover">
    <div class="p-5 text-center">
      <h3 class="text-xl font-semibold">Мантоварка</h3>
      <p class="opacity-80">от 12 000 ₸</p>
    </div>
  </div>

  <div class="item set product bg-black/50">
    <img src="https://via.placeholder.com/400x300" class="w-full h-56 object-cover">
    <div class="p-5 text-center">
      <h3 class="text-xl font-semibold">Сервиз</h3>
      <p class="opacity-80">от 18 000 ₸</p>
    </div>
  </div>

  <div class="item tea product bg-black/50">
    <img src="https://via.placeholder.com/400x300" class="w-full h-56 object-cover">
    <div class="p-5 text-center">
      <h3 class="text-xl font-semibold">Чайник</h3>
      <p class="opacity-80">от 8 000 ₸</p>
    </div>
  </div>

  <div class="item accessory product bg-black/50">
    <img src="https://via.placeholder.com/400x300" class="w-full h-56 object-cover">
    <div class="p-5 text-center">
      <h3 class="text-xl font-semibold">Фруктовница</h3>
      <p class="opacity-80">от 6 000 ₸</p>
    </div>
  </div>

</section>
</main>

<footer class="text-center py-6 text-sm opacity-80 border-t border-yellow-400/40">
  © 2026 Daria Posuda Uralsk
</footer>

<!-- INLINE CSS -->
<style>
.themeBtn {
  border:1px solid rgba(250,204,21,.6);
  padding:.4rem .8rem;
  border-radius:9999px;
  color:#fde68a;
}
.themeBtn:hover { background:#fde68a; color:#000; }

.tabBtn {
  border:1px solid rgba(255,255,255,.3);
  padding:.5rem 1.2rem;
  border-radius:9999px;
}

.product {
  border-radius:1.5rem;
  overflow:hidden;
  box-shadow:0 25px 50px -12px rgba(0,0,0,.25);
}
</style>

<!-- SCRIPT -->
<script>
function setTheme(t){
  const b = document.getElementById('page');
  b.className = 'min-h-screen transition-colors duration-500';

  const themes = {
    emerald:['bg-gradient-to-br','from-emerald-950','via-emerald-900','to-black','text-emerald-50'],
    navy:['bg-gradient-to-br','from-blue-950','via-blue-900','to-black','text-blue-100'],
    black:['bg-black','text-gray-100'],
    white:['bg-stone-100','text-gray-900'],
    rose:['bg-gradient-to-br','from-rose-100','via-rose-50','to-amber-50','text-gray-800'],
    olive:['bg-gradient-to-br','from-emerald-900','via-emerald-800','to-neutral-900','text-emerald-100'],
    midnight:['bg-gradient-to-br','from-slate-950','via-indigo-950','to-black','text-indigo-100'],
    cream:['bg-gradient-to-br','from-amber-50','via-stone-50','to-white','text-stone-800'],
    platinum:['bg-gradient-to-br','from-neutral-200','via-neutral-100','to-white','text-neutral-900']
  };

  themes[t].forEach(c => b.classList.add(c));
}

function filterItems(cat){
  document.querySelectorAll('.item').forEach(el=>{
    el.style.display = (cat==='all' || el.classList.contains(cat)) ? 'block' : 'none';
  });
}
</script>

</body>
</html>
